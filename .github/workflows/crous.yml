name: CROUS Monitor

on:
  schedule:
    - cron: '*/15 * * * *' # Her 15 dakikada bir otomatik çalışır
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install requests
      - name: Install dependencies
        run: |
          pip install playwright requests
          playwright install chromium

      - name: Run script
        run: python monitor3.py
      - name: Run script
        run: python monitor3.py
